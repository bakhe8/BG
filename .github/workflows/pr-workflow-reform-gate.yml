name: PR Workflow Reform Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-body:
    name: Validate PR Reform Template
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR body against required workflow reform fields
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/ci/validate_pr_workflow_reform.py
